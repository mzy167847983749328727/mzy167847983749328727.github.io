<style>
.academic-timeline {
  margin: 36px 0 48px;
}

.academic-timeline-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 22px;
  color: #2f3a45;
}

.academic-timeline-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.academic-card {
  position: relative;
  padding: 22px 18px;
  border-radius: 18px;
  background: #ffffff;
  border: 1px solid #e5e7eb;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  transition: all 0.25s ease;
}

.academic-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 32px rgba(15, 23, 42, 0.11);
}

.academic-logo {
  width: 54px;
  height: 54px;
  object-fit: contain;
  padding: 7px;
  border-radius: 14px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  margin-bottom: 14px;
}

.academic-year {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  color: #2563eb;
  background: #eff6ff;
  border-radius: 999px;
  padding: 4px 10px;
  margin-bottom: 10px;
}

.academic-degree {
  font-size: 18px;
  font-weight: 700;
  color: #1f2937;
  margin-bottom: 8px;
}

.academic-school {
  font-size: 14px;
  line-height: 1.6;
  color: #475569;
}

@media (max-width: 768px) {
  .academic-timeline-row {
    grid-template-columns: 1fr;
  }
}
</style>

<section class="academic-timeline">

      <div class="academic-degree">Undergraduate</div>
      <div class="academic-school">河北大学 · 管理学院</div>
    </div>

    <div class="academic-card">
      <img class="academic-logo" src="/images/cas.jpg" alt="Chinese Academy of Sciences logo">

      <div class="academic-degree">Master's Study</div>
      <div class="academic-school">中国科学院文献情报中心</div>

      <div class="academic-degree">PhD Study</div>
      <div class="academic-school">武汉大学 · 信息管理学院</div>
    </div>
